syntax = "proto3";

package analysis;

service AnalysisService {
  // Analyzes a video and returns a stream of progress updates and final results.
  rpc AnalyzeVideo(AnalysisRequest) returns (stream AnalysisResponse);
}

// Request to analyze a video file
message AnalysisRequest {
  string video_path = 1;           // Path to input video file
  string match_id = 2;             // Unique match identifier
  int32 frame_limit = 3;           // Max frames to process (0 = all)
  bool skip_json = 4;              // Skip JSON export if true
  float confidence_threshold = 5;  // YOLO general confidence threshold
  string calibration_json = 6;     // Optional manual calibration (JSON string)
  string roi_json = 7;             // Optional ROI masking (JSON string)
  float ball_confidence = 8;       // Specific ball detection threshold
  int32 max_lost_frames = 9;       // ByteTracker max_lost
  bool enable_reid = 10;           // Enable deep learning Re-ID (BoT-SORT / OsNet)
}

// Streaming response with progress and final results
message AnalysisResponse {
  string match_id = 1;
  string status = 2;               // PENDING, PROCESSING, COMPLETED, FAILED, ALERT
  float progress = 3;              // 0.0 to 1.0
  string message = 4;
  
  // Tactical Alert (populated when status is ALERT)
  TacticalAlert alert = 6;

  // Final results (only populated when status is COMPLETED)
  AnalysisResult result = 5;
}

// Structured tactical alert packet for real-time intervention
message TacticalAlert {
  string alert_id = 1;
  string timestamp = 2;
  float severity_score = 3;
  string severity_label = 4;
  string category = 5;
  string decision_type = 6;
  string status = 7;               // ACTIVE, MONITORING, RESOLVED, ESCALATED
  string action = 8;
  int32 review_countdown = 9;
  int32 category_trigger_count = 10;
}

// Complete analysis results
message AnalysisResult {
  string match_id = 1;
  int32 total_frames = 2;
  int32 players_tracked = 3;
  
  // Output file paths (relative to outputs directory)
  string tracking_video_path = 4;           // tracking_full_output.mp4
  string tracking_json_path = 5;            // tracking_results.json
  string backline_video_path = 6;           // backline_analysis.mp4
  string heatmap_video_path = 7;            // heatmap_analysis.mp4
  string possession_analysis_path = 8;      // possession_analysis_results.json
  string animation_video_path = 9;          // tracking_animation.mp4
  
  // Performance metrics
  double processing_time_seconds = 10;
  double fps = 11;
  
  // Error information (if any)
  string error_message = 12;
  
  // Tactical AI Advisory (AI Tactical Report)
  string tactical_advisory_path = 13;
}
